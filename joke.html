<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary-color: #ff6b6b;
    --secondary-color: #4ecdc4;
    --accent-color: #ffa502;
    --dark-bg: #2c3e50;
    --light-bg: #ecf0f1;
    --card-bg: #ffffff;
    --text-color: #333;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    color: var(--text-color);
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

.header {
    text-align: center;
    color: white;
    margin-bottom: 3rem;
}

.header h1 {
    font-size: 3rem;
    margin-bottom: 0.5rem;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
}

.header p {
    font-size: 1.2rem;
    opacity: 0.9;
}

.joke-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 2.5rem;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    position: relative;
    min-height: 300px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-bottom: 2rem;
}

.joke-type-badge {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: var(--primary-color);
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
}

.joke-text {
    font-size: 1.5rem;
    line-height: 1.8;
    text-align: center;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.joke-setup {
    font-size: 1.3rem;
    line-height: 1.8;
    text-align: center;
    margin-bottom: 2rem;
}

.reveal-btn {
    background: var(--secondary-color);
    color: white;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 25px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 1rem;
    transition: all 0.3s ease;
}

.reveal-btn:hover {
    background: #3bb8ac;
    transform: scale(1.05);
}

.joke-delivery {
    font-size: 1.3rem;
    line-height: 1.8;
    text-align: center;
    margin-top: 1rem;
    color: var(--secondary-color);
    font-weight: 600;
}

.delivery-text.hidden {
    display: none;
}

.controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
}

.btn {
    padding: 1rem 1.5rem;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-primary {
    background: var(--primary-color);
    color: white;
    box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
}

.btn-primary:hover {
    background: #ff5252;
    transform: translateY(-2px);
}

.btn-secondary {
    background: var(--card-bg);
    color: var(--primary-color);
    border: 2px solid var(--primary-color);
}

.btn-secondary:hover {
    background: var(--primary-color);
    color: white;
}

.category-buttons {
    background: var(--card-bg);
    padding: 2rem;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    margin-bottom: 2rem;
    text-align: center;
}

.category-buttons h3 {
    margin-bottom: 1.5rem;
    color: var(--dark-bg);
}

.category-btn {
    padding: 0.75rem 1.5rem;
    border: 2px solid #ccc;
    background: white;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    margin: 0.5rem;
    transition: all 0.3s ease;
}

.category-btn:hover {
    border-color: var(--primary-color);
    color: var(--primary-color);
}

.category-btn.active {
    background: var(--primary-color);
    border-color: var(--primary-color);
    color: white;
}

.stats-section {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
}

.stat-box {
    background: var(--card-bg);
    padding: 1.5rem;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    text-align: center;
}

.stat-box h4 {
    color: #666;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
}

.stat-box p {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--primary-color);
}

.favorites-section {
    background: var(--card-bg);
    padding: 2rem;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.favorites-section h3 {
    margin-bottom: 1rem;
    color: var(--dark-bg);
}

.favorites-list {
    max-height: 300px;
    overflow-y: auto;
}

.favorite-item {
    background: #f5f5f5;
    padding: 1rem;
    margin-bottom: 0.5rem;
    border-radius: 8px;
    border-left: 4px solid var(--primary-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.favorite-text {
    flex: 1;
    font-size: 0.95rem;
}

.favorite-btn {
    background: none;
    border: none;
    cursor: pointer;
    margin-left: 0.5rem;
    font-size: 1.2rem;
}

.empty-message {
    text-align: center;
    color: #999;
    padding: 2rem;
}

.toast {
    position: fixed;
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--dark-bg);
    color: white;
    padding: 1rem 2rem;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    z-index: 999;
    transition: all 0.3s ease;
}

.toast.show {
    bottom: 20px;
}

.loading {
    display: none;
    text-align: center;
    color: white;
}

.loading.show {
    display: block;
}

@media (max-width: 480px) {
    .header h1 {
        font-size: 1.8rem;
    }
    
    .joke-text {
        font-size: 1.1rem;
    }
    
    .controls {
        grid-template-columns: 1fr;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>😂 Joke Generator</h1>
            <p>Get a random laugh with every click!</p>
        </header>

        <div class="loading" id="loading">
            <p>Loading joke...</p>
        </div>

        <div class="joke-card">
            <div class="joke-type-badge" id="jokeTypeBadge">Loading...</div>
            
            <div class="joke-text" id="jokeText">
                <p>Click the button below to get a joke!</p>
            </div>

            <div class="joke-setup" id="jokeSetup" style="display: none;">
                <p id="setupText"></p>
            </div>

            <div id="jokeDelivery" style="display: none;">
                <button class="reveal-btn" id="revealBtn">Show Punchline</button>
                <p id="deliveryText" class="joke-delivery delivery-text hidden"></p>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="getJokeBtn">🎲 Get a Joke</button>
            <button class="btn btn-secondary" id="copyBtn">📋 Copy</button>
            <button class="btn btn-secondary" id="favoriteBtn">❤️ Favorite</button>
        </div>

        <div class="category-buttons">
            <h3>Filter by Category</h3>
            <button class="category-btn active" data-category="Any">Any</button>
            <button class="category-btn" data-category="general">General</button>
            <button class="category-btn" data-category="programming">Programming</button>
            <button class="category-btn" data-category="knock-knock">Knock-Knock</button>
        </div>

        <div class="stats-section">
            <div class="stat-box">
                <h4>Jokes Loaded</h4>
                <p id="jokeCount">0</p>
            </div>
            <div class="stat-box">
                <h4>Favorites</h4>
                <p id="favoriteCount">0</p>
            </div>
            <div class="stat-box">
                <h4>Session Time</h4>
                <p id="sessionTime">0s</p>
            </div>
        </div>

        <div class="favorites-section">
            <h3>⭐ Favorite Jokes</h3>
            <div class="favorites-list" id="favoritesList">
                <p class="empty-message">No favorites yet. Click ❤️ to add!</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
// DOM Elements
const getJokeBtn = document.getElementById('getJokeBtn');
const copyBtn = document.getElementById('copyBtn');
const favoriteBtn = document.getElementById('favoriteBtn');
const jokeText = document.getElementById('jokeText');
const jokeSetup = document.getElementById('jokeSetup');
const jokeDelivery = document.getElementById('jokeDelivery');
const revealBtn = document.getElementById('revealBtn');
const setupText = document.getElementById('setupText');
const deliveryText = document.getElementById('deliveryText');
const jokeTypeBadge = document.getElementById('jokeTypeBadge');
const categoryBtns = document.querySelectorAll('.category-btn');
const jokeCountEl = document.getElementById('jokeCount');
const favoriteCountEl = document.getElementById('favoriteCount');
const sessionTimeEl = document.getElementById('sessionTime');
const favoritesList = document.getElementById('favoritesList');
const toast = document.getElementById('toast');
const loading = document.getElementById('loading');

// State
let currentJoke = null;
let selectedCategory = 'Any';
let jokeCount = 0;
let favorites = [];
let sessionStartTime = Date.now();

// API Configuration
const JOK_API = 'https://v2.jokeapi.dev/joke';

// Initialize
window.addEventListener('load', () => {
    loadFavorites();
    startSessionTimer();
    getJoke();
});

// Get Joke from API
async function getJoke() {
    try {
        showLoading(true);
        
        const endpoint = `${JOK_API}/${selectedCategory}`;
        const response = await fetch(endpoint);
        
        if (!response.ok) {
            throw new Error('Failed to fetch joke');
        }

        const data = await response.json();
        
        if (data.error) {
            throw new Error(data.message || 'API Error');
        }

        currentJoke = data;
        displayJoke(data);
        jokeCount++;
        updateStats();

    } catch (error) {
        console.error('Error fetching joke:', error);
        showToast('Failed to load joke. Please try again.');
        jokeText.innerHTML = '<p>Oops! Could not load a joke. Please try again.</p>';
    } finally {
        showLoading(false);
    }
}

// Display Joke
function displayJoke(joke) {
    jokeSetup.style.display = 'none';
    jokeDelivery.style.display = 'none';
    jokeText.innerHTML = '';

    const category = joke.category.charAt(0).toUpperCase() + joke.category.slice(1);
    const type = joke.type.toUpperCase();
    jokeTypeBadge.textContent = `${category} - ${type}`;

    if (joke.type === 'single') {
        jokeText.innerHTML = `<p>"${joke.joke}"</p>`;
    } else {
        setupText.textContent = joke.setup;
        deliveryText.textContent = joke.delivery;
        deliveryText.classList.add('hidden');
        revealBtn.textContent = 'Show Punchline';

        jokeSetup.style.display = 'block';
        jokeDelivery.style.display = 'block';
    }
}

// Reveal Punchline
revealBtn.addEventListener('click', () => {
    deliveryText.classList.toggle('hidden');
    revealBtn.textContent = deliveryText.classList.contains('hidden') 
        ? 'Show Punchline' 
        : 'Hide Punchline';
});

// Get Joke Button
getJokeBtn.addEventListener('click', getJoke);

// Copy Joke
copyBtn.addEventListener('click', () => {
    if (!currentJoke) return;

    let textToCopy = '';
    if (currentJoke.type === 'single') {
        textToCopy = currentJoke.joke;
    } else {
        textToCopy = `${currentJoke.setup}\n${currentJoke.delivery}`;
    }

    navigator.clipboard.writeText(textToCopy).then(() => {
        showToast('✓ Copied to clipboard!');
    }).catch(err => {
        showToast('Failed to copy joke');
    });
});

// Add to Favorites
favoriteBtn.addEventListener('click', () => {
    if (!currentJoke) return;

    const favoriteItem = {
        id: Date.now(),
        text: currentJoke.type === 'single' 
            ? currentJoke.joke 
            : `${currentJoke.setup} - ${currentJoke.delivery}`
    };

    if (!favorites.some(fav => fav.id === favoriteItem.id)) {
        favorites.push(favoriteItem);
        saveFavorites();
        updateFavoritesList();
        updateStats();
        showToast('❤️ Added to favorites!');
    } else {
        showToast('Already in favorites');
    }
});

// Update Favorites List Display
function updateFavoritesList() {
    if (favorites.length === 0) {
        favoritesList.innerHTML = '<p class="empty-message">No favorites yet. Click ❤️ to add!</p>';
        return;
    }

    favoritesList.innerHTML = favorites.map(fav => `
        <div class="favorite-item">
            <span class="favorite-text">"${fav.text}"</span>
            <button class="favorite-btn" onclick="removeFavorite(${fav.id})">🗑️</button>
        </div>
    `).join('');
}

// Remove from Favorites
function removeFavorite(id) {
    favorites = favorites.filter(fav => fav.id !== id);
    saveFavorites();
    updateFavoritesList();
    updateStats();
    showToast('Removed from favorites');
}

// Save Favorites
function saveFavorites() {
    localStorage.setItem('jokeGeneratorFavorites', JSON.stringify(favorites));
}

// Load Favorites
function loadFavorites() {
    const saved = localStorage.getItem('jokeGeneratorFavorites');
    if (saved) {
        favorites = JSON.parse(saved);
        updateFavoritesList();
        updateStats();
    }
}

// Category Selection
categoryBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        categoryBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedCategory = btn.getAttribute('data-category');
        getJoke();
    });
});

// Update Statistics
function updateStats() {
    jokeCountEl.textContent = jokeCount;
    favoriteCountEl.textContent = favorites.length;
}

// Session Timer
function startSessionTimer() {
    setInterval(() => {
        const elapsedSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
        
        if (elapsedSeconds < 60) {
            sessionTimeEl.textContent = elapsedSeconds + 's';
        } else if (elapsedSeconds < 3600) {
            const minutes = Math.floor(elapsedSeconds / 60);
            const seconds = elapsedSeconds % 60;
            sessionTimeEl.textContent = `${minutes}m ${seconds}s`;
        } else {
            const hours = Math.floor(elapsedSeconds / 3600);
            const minutes = Math.floor((elapsedSeconds % 3600) / 60);
            sessionTimeEl.textContent = `${hours}h ${minutes}m`;
        }
    }, 1000);
}

// Loading Spinner
function showLoading(show) {
    loading.classList.toggle('show', show);
    getJokeBtn.disabled = show;
}

// Toast Notification
function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');

    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

console.log('Joke Generator loaded successfully!');
    </script>
</body>
</html>
